<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCF Contacts - Sign Up</title>
    <link rel="stylesheet" type="text/css" href="../css/signup.css"> <!-- related CSS file -->
</head>
<body>
    <div class="wrapper">

        <main>
            <div class="background">
                <div class="slash"></div>
            </div>

            <section id="signup-page">

                <div class="header">

                    <div class="logoContainer">
                        <span>UCF Contacts</span>
                    
                        <img src = "contactLogo.png">

                        <div class="loginText">
                             <span>Welcome, please login.</span>
                        </div>
                
                    </div>

                </div>

                <div class="container">
                    <div class="sign-up">
                        <form id="inputs">
                            <h3>Sign Up!</h3>
                            
                            <div class="input-container">
                                <div class="input-container">First Name:</div>
                                
                                <input type="text" id="first-name" placeholder="John"> 

                                <span id="firstname-icon"></span>
                            </div>

                            
                            <div class="input-container">
                                <div class="input-container">Last Name:</div>
            
                                <input type="text" id="last-name" placeholder="Doe">
                            
                                <span id="lastname-icon"></span>
                            </div>

                         
                            <div class="input-container">
                                <div class="input-container">Username:</div>
                                
                                <input type="text" id="username" placeholder="Username">
                            
                                <span id="username-icon"></span>
                            </div>

                            
                            <div class="input-container">
                                <div class="input-container">Password:</div>
                                
                                <input type="password" id="password" placeholder="Password">
                                
                                <span id="password-icon"></span>
                            </div>

                             
                            <div class="input-container">
                                <div class="input-container">Confirm Password:</div>
                                
                                <input type="password" id="password" placeholder="Password">
                                
                                <span id="password-icon"></span>
                            </div>

                            <div class="submitBtn">
                                <button type="submit" class="btn">Sign Up</button>
                            </div>
                            
                        </form>
                        <p id="error-message" style="color: red;"></p>
                    </div>
                </div>

            </section>
        </main>


        <script src="../js/signup.js"></script> <!-- related JS file -->

        <div style="margin-top:500px"></div>
    </div>
</body>
</html>
