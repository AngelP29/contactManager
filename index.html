<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCF Contacts - Log in</title>
    <link rel="stylesheet" type="text/css" href="../css/index.css"> <!-- related CSS file -->
</head>
<body>

    <div class="wrapper">
        <main>

            <div class="background">
                <div class="slash"></div>
            </div>

            <section id="home-page">

                <div class="header">

                    <div class="logoContainer">
                        <span>UCF Contacts</span>
                    
                        <img src = "contactLogo.png">

                        <div class="loginText">
                             <span>Welcome, please login.</span>
                        </div>
                
                    </div>

                </div>

                <div class="logInContainer">

                    <div class="login-side">
                        <form id="inputs">
                            <h3>Log in to your account</h3>

                            <label>Username:</label>
                            <div class="input-container">
                                <input type="text" id="username" placeholder="Username">
                                <span id="username-icon"></span>
                            </div>

                            <label>Password:</label>
                            <div class="input-container">
                                <input type="password" id="password" placeholder="Password">
                                <span id="password-icon"></span>
                            </div>

                            <button type="submit" class="btn">Log In</button>

                             <div class='loginFooter'>
                                <p>Not yet registered? Create an account below.</p>
                            </div>

                            <button type="submit" class="btn">Sign Up</button>

                            <!-- <a href="dashboard.html" class="btn">Log In</a> -->
                        </form>
                        <p id="error-message" style="color: red;"></p>
                    </div>

                </div>
                
            </section>

        </main>

        <script src="../js/index.js"></script> <!-- related JS file -->

        <!-- <div style="margin-top:500px"></div> -->
    </div>
</body>
</html>
