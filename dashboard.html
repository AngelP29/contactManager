<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Manager</title>
    <link rel="stylesheet" type="text/css" href="../css/dashboard.css"> <!-- related CSS file -->
</head>
<body>
    <div class="wrapper">
        <nav class="navbar">
            <div class="nav-left">
                <button type="button" id="add-contact" class="btn">Add</button>
                <button type="button" id="delete-contact" class="btn">Delete</button>
                <button type="button" id="update-contact" class="btn">Update</button>
                <button type="button" id="confirm-delete" class="btn-confirm" style="display: none;">Confirm Delete</button>
            </div>

            <div class="nav-right">
                <form id="search-form">
                    <input type="text" id="searchContact" placeholder="Search Contact">
                    <button type="submit" class="btn">Search</button>
                </form>
            </div>
        </nav>

        <!-- must add 6th button which confirms delete -->
        <!-- also verify if we have all 6 buttons -->

        <header id="main-header">
            <h1 id="header">Dashboard</h1>
        </header>

        <main>
            <section id="dashboard-content">
                <div id="delete-bar" class="delete-bar" style="display: none;">
                    <span id="delete-bar-text"> Select contacts using the checkboxes, then click Delete Selected</span>
                </div>

                <!-- contacts table -->
                <div class="table-wrapper">
                    <table id="contacts-table">
                        <thead>
                            <tr>
                                <th style="display: none;"></th>
                                <th>First Name</th>
                                <th>Last Name</th>
                                <th>Phone</th>
                                <th>E-mail</th>
                            </tr>
                        </thead>

                        <tbody id="contact-body">
                            <!-- rows inserted here by JS -->
                            <tr>
                                <td colspan="5">No contacts found.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>

        <footer class="footer">
            <p>Copyright &copy; 2026 Contact Manager. All Rights Reserved</p>
        </footer>

        <!-- <div style="margin-top:500px"></div> -->
    </div>
</body>
</html>
